name: 📄 Daily Research Paper Reminder (v3 — Email + GitHub Issue)

on:
  # ── Runs every day at 9:00 AM IST (03:30 UTC) ────────────────────────────
  schedule:
    - cron: "30 3 * * *"

  # ── Manual trigger from GitHub Actions UI ────────────────────────────────
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (select paper but do NOT send email or create issue)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  issues: write      # create GitHub Issues
  contents: write    # commit state.json back to repo

jobs:
  suggest-paper:
    name: Select Paper → Send Email → Create Issue
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Run the script ─────────────────────────────────────────────────
      - name: Run daily paper script
        env:
          # GitHub (auto-injected)
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          # Email (set these in repo Settings → Secrets and variables → Actions)
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          echo "Running at: $(date -u '+%Y-%m-%d %H:%M:%S UTC') = 9:00 AM IST"
          python .github/paper-reminder/daily_paper.py

      # ── 4. Commit state.json ──────────────────────────────────────────────
      - name: Save state (track shown papers)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions [Paper Reminder]"
          git add .github/paper-reminder/state.json
          git diff --staged --quiet || \
            git commit -m "chore(paper-reminder): update state.json [skip ci]"
          git push
        continue-on-error: true
